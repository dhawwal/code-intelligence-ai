<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | Codebase Explainer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container fade-in">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <h2 style="font-weight: 800; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Codebase Chat</h2>
                <p id="repo-id-display" style="color: var(--text-dim); font-size: 0.8rem; font-family: monospace;">ID: {{ repo_id }}</p>
            </div>
            <a href="/" style="color: var(--text-dim); text-decoration: none; font-weight: 600;">← Back</a>
        </header>

        <div id="loading-overlay" class="glass-card" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; text-align: center; padding: 3rem; display: none;">
            <div class="loader" style="display: inline-block; width: 48px; height: 48px; margin-bottom: 1rem;"></div>
            <h3>Indexing Repository...</h3>
            <p style="color: var(--text-dim); margin-top: 1rem;">This may take a few minutes for larger codebases.</p>
        </div>

        <div class="glass-card" style="padding: 1.5rem; display: flex; flex-direction: column; height: calc(100vh - 200px);">
            <div id="chat-window" class="chat-container">
                <div class="message ai">
                    Hello! I've indexed your repository. How can I help you understand the code today?
                </div>
            </div>

            <div class="input-group" style="margin-top: auto; margin-bottom: 0;">
                <input type="text" id="chat-input" placeholder="Ask about architecture, a specific function, or how to implement a feature..." autocomplete="off">
                <button id="send-btn" onclick="sendMessage()">
                    <span id="btn-text">Send</span>
                    <div id="btn-loader" class="loader"></div>
                </button>
            </div>
        </div>
    </div>

    <script>
        const repo_id = "{{ repo_id }}";
        const chatWindow = document.getElementById('chat-window');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoader = document.getElementById('btn-loader');
        const loadingOverlay = document.getElementById('loading-overlay');

        // Check if the repo is ready on load
        checkIndexingStatus();

        async function checkIndexingStatus() {
            loadingOverlay.style.display = 'block';
            
            const check = async () => {
                try {
                    const response = await fetch(`/api/repo/status/${repo_id}`);
                    const data = await response.json();
                    
                    if (data.status === 'ready') {
                        loadingOverlay.style.display = 'none';
                        return true;
                    }
                } catch (e) {
                    console.error("Status check failed", e);
                }
                return false;
            };

            const isReady = await check();
            if (!isReady) {
                const interval = setInterval(async () => {
                    if (await check()) {
                        clearInterval(interval);
                    }
                }, 3000);
            }
        }

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        async function sendMessage() {
            const question = chatInput.value.trim();
            if (!question) return;

            // Add user message to UI
            addMessage(question, 'user');
            chatInput.value = '';

            // Set loading state
            sendBtn.disabled = true;
            btnText.style.display = 'none';
            btnLoader.style.display = 'inline-block';

            try {
                const response = await fetch('/api/chat/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ repo_id, question })
                });

                if (response.ok) {
                    const data = await response.json();
                    addMessage(data.answer, 'ai', data.sources);
                } else {
                    const errorText = await response.text();
                    let errorMessage = "Server error";
                    try {
                        const errorJson = JSON.parse(errorText);
                        errorMessage = errorJson.error || errorMessage;
                    } catch (e) {
                        errorMessage = errorText || errorMessage;
                    }
                    throw new Error(errorMessage);
                }
            } catch (error) {
                addMessage("Error: " + error.message, 'ai');
            } finally {
                sendBtn.disabled = false;
                btnText.style.display = 'inline-block';
                btnLoader.style.display = 'none';
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }

        function addMessage(text, role, sources = []) {
            const div = document.createElement('div');
            div.className = `message ${role} fade-in`;
            
            if (role === 'ai') {
                let html = marked.parse(text);
                if (sources && sources.length > 0) {
                    html += '<div class="sources">';
                    const uniqueSources = [...new Set(sources.map(s => `${s.file}:${s.line}`))];
                    uniqueSources.forEach(s => {
                        html += `<span class="source-badge">${s}</span>`;
                    });
                    html += '</div>';
                }
                div.innerHTML = html;
            } else {
                div.textContent = text;
            }

            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
